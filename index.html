<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선생님, 감사합니다! 💌</title>

<style>
:root{
    --bg-color:#0f1117;
    --paper-color:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Noto Sans KR',sans-serif;
    overflow:hidden;

    background:
    radial-gradient(circle at top,#1e293b 0%,#0f1117 40%,#090b10 100%);
}

/* 별빛 */
body::before{
    content:'';
    position:fixed;
    inset:0;

    background-image:
    radial-gradient(white 1px,transparent 1px),
    radial-gradient(white 1px,transparent 1px);

    background-size:100px 100px;
    background-position:0 0,50px 50px;

    opacity:.15;
    animation:twinkle 5s linear infinite;
    pointer-events:none;
}

@keyframes twinkle{
    0%{opacity:.08;}
    50%{opacity:.18;}
    100%{opacity:.08;}
}

/* 떠다니는 효과 */
.letter-container{
    position:relative;
    cursor:pointer;

    display:flex;
    flex-direction:column;
    align-items:center;

    animation:floatLetter 4s ease-in-out infinite;
}

@keyframes floatLetter{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.hint{
    color:#fff;
    font-size:1.1rem;
    margin-bottom:20px;
    font-weight:bold;
    animation:bounce 1.5s infinite;
    text-shadow:0 0 10px rgba(255,255,255,.4);
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* 무지개 색상 변화 */
@keyframes rainbowEnvelope{
    0%{
        background:#ff6b6b;
        box-shadow:0 0 40px rgba(255,107,107,.5);
    }

    20%{
        background:#ffb347;
        box-shadow:0 0 40px rgba(255,179,71,.5);
    }

    40%{
        background:#6bcb77;
        box-shadow:0 0 40px rgba(107,203,119,.5);
    }

    60%{
        background:#4d96ff;
        box-shadow:0 0 40px rgba(77,150,255,.5);
    }

    80%{
        background:#a66cff;
        box-shadow:0 0 40px rgba(166,108,255,.5);
    }

    100%{
        background:#ff6b6b;
        box-shadow:0 0 40px rgba(255,107,107,.5);
    }
}

.envelope{
    position:relative;
    width:300px;
    height:200px;

    border-bottom-left-radius:10px;
    border-bottom-right-radius:10px;

    animation:rainbowEnvelope 8s linear infinite;
    transition:transform .6s ease;
}

/* 덮개 */
.envelope::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    z-index:3;

    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:100px solid rgba(0,0,0,.25);

    transform-origin:top;
    transition:transform .6s ease;
}

/* 아래 삼각형 */
.envelope::after{
    content:'';
    position:absolute;
    bottom:0;
    z-index:2;

    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-bottom:100px solid rgba(255,255,255,.15);
}

.paper{
    position:absolute;
    left:15px;
    bottom:0;

    width:270px;
    height:170px;

    background:white;
    border-radius:8px;

    padding:20px;

    overflow:hidden;

    z-index:1;

    transition:
    transform .6s ease,
    height .6s ease,
    width .6s ease,
    left .6s ease;

    box-shadow:
    0 2px 10px rgba(0,0,0,.2);
}

.paper h2{
    margin-bottom:10px;
    color:#333;
    border-bottom:2px dashed #ff7b7b;
    padding-bottom:5px;
}

.paper p{
    color:#555;
    line-height:1.6;
    white-space:pre-line;
    font-size:.9rem;
}

/* 열린 상태 */
.letter-container.active .envelope::before{
    transform:rotateX(180deg);
}

.letter-container.active .envelope{
    transform:translateY(90px);
}

.letter-container.active .paper{
    transform:
    translateY(-210px)
    scale(1.08);

    left:-25px;
    width:350px;
    height:min(430px,65vh);

    overflow-y:auto;

    z-index:4;

    box-shadow:
    0 0 30px rgba(255,255,255,.35),
    0 0 80px rgba(255,255,255,.15);
}

.paper::-webkit-scrollbar{
    width:6px;
}

.paper::-webkit-scrollbar-thumb{
    background:#ccc;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="letter-container" onclick="toggleLetter()">

    <div class="hint" id="hint-text">
        ✉️ 편지봉투를 클릭해서 열어보세요!
    </div>

    <div class="envelope">

        <div class="paper">

            <h2>To. OO 선생님께</h2>

            <p>
선생님, 안녕하세요! Ditto입니다.

직접 말로 드리기엔 조금 쑥스러워서,
제가 좋아하는 코딩으로 작은 디지털 편지를 만들어 보았습니다. 😊

학기 동안 부족한 저를 늘 따뜻하게 지도해 주시고,
많은 것을 배울 수 있게 도와주셔서 진심으로 감사드립니다.

선생님 덕분에 정말 많이 성장할 수 있었어요.

늘 건강하시고 앞으로도 행복한 일들만 가득하시길 바랍니다.

선생님, 정말 감사드립니다! ❤️

- 제자 Ditto 올림 -
            </p>

        </div>

    </div>

</div>

<script>
function toggleLetter(){

    const container =
    document.querySelector('.letter-container');

    const hint =
    document.getElementById('hint-text');

    container.classList.toggle('active');

    if(container.classList.contains('active')){
        hint.innerText =
        '✨ 언제나 감사드립니다 ✨';
    }
    else{
        hint.innerText =
        '✉️ 편지봉투를 클릭해서 열어보세요!';
    }
}
</script>

</body>
</html>
